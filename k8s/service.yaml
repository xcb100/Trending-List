apiVersion: v1
kind: Service
metadata:
  name: leaderboard-service
  namespace: leaderboard
  labels:
    app: leaderboard
spec:
  type: NodePort
  selector:
    app: leaderboard
  ports:
    - name: business
      port: 8080
      targetPort: business
      protocol: TCP
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-internal
  namespace: leaderboard
  labels:
    app: leaderboard
spec:
  type: ClusterIP
  selector:
    app: leaderboard
  ports:
    - name: internal
      port: 9090
      targetPort: internal
      protocol: TCP
