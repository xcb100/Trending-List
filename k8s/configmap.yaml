apiVersion: v1
kind: ConfigMap
metadata:
  name: leaderboard-config
  namespace: leaderboard
data:
  BUSINESS_ADDR: ":8080"
  INTERNAL_ADDR: ":9090"
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"
  REDIS_DIAL_TIMEOUT: "1s"
  REDIS_READ_TIMEOUT: "1s"
  REDIS_WRITE_TIMEOUT: "1s"
  REDIS_POOL_TIMEOUT: "2s"
  HTTP_READ_HEADER_TIMEOUT: "2s"
  HTTP_READ_TIMEOUT: "5s"
  HTTP_WRITE_TIMEOUT: "10s"
  HTTP_IDLE_TIMEOUT: "60s"
  SHUTDOWN_TIMEOUT: "5s"
  HEALTHCHECK_TIMEOUT: "1s"
  SCHEDULER_ENABLED: "true"
  REDIS_REPOSITORY_TIMEOUT: "800ms"
  SCHEDULED_TASK_TIMEOUT: "5s"
  SCHEDULED_TASK_LOCK_TTL: "10s"
  LEADERBOARD_CREATE_LOCK_TTL: "5s"
