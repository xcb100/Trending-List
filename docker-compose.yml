services:
  mysql:
    image: mysql:8.4
    container_name: trendinglist-mysql
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${COMPOSE_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${COMPOSE_MYSQL_DATABASE:-leaderboard}
      MYSQL_USER: ${COMPOSE_MYSQL_USER:-leaderboard}
      MYSQL_PASSWORD: ${COMPOSE_MYSQL_PASSWORD:-leaderboard}
    ports:
      - "3306:3306"
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -proot --silent
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: trendinglist-redis
    command:
      - redis-server
      - --appendonly
      - yes
      - --save
      - "60"
      - "1000"
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendinglist-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BUSINESS_ADDR: ${BUSINESS_ADDR:-:8080}
      INTERNAL_ADDR: ${INTERNAL_ADDR:-:9090}
      REDIS_ADDR: ${COMPOSE_REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "${REDIS_DB:-0}"
      MYSQL_DSN: ${COMPOSE_MYSQL_DSN:-leaderboard:leaderboard@tcp(mysql:3306)/leaderboard?parseTime=true&charset=utf8mb4,utf8}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      MYSQL_MAX_OPEN_CONNS: "${MYSQL_MAX_OPEN_CONNS:-20}"
      MYSQL_MAX_IDLE_CONNS: "${MYSQL_MAX_IDLE_CONNS:-5}"
      MYSQL_CONN_MAX_LIFETIME: ${MYSQL_CONN_MAX_LIFETIME:-30m}
      MYSQL_EVENT_MERGE_INTERVAL: ${MYSQL_EVENT_MERGE_INTERVAL:-1s}
      MYSQL_EVENT_MERGE_BATCH_SIZE: "${MYSQL_EVENT_MERGE_BATCH_SIZE:-500}"
      MYSQL_EVENT_CLEANUP_INTERVAL: ${MYSQL_EVENT_CLEANUP_INTERVAL:-1m}
      MYSQL_EVENT_CLEANUP_RETENTION: ${MYSQL_EVENT_CLEANUP_RETENTION:-24h}
      MYSQL_EVENT_CLEANUP_BATCH_SIZE: "${MYSQL_EVENT_CLEANUP_BATCH_SIZE:-1000}"
    ports:
      - "8080:8080"
      - "9090:9090"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
